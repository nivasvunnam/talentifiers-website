<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Talentifiers is a Hyderabad-based IT services and enterprise solutions company delivering software development, cloud, analytics, consulting, testing, and business solutions." />
    <meta name="theme-color" content="#0B1F3A" />
    <meta property="og:title" content="Talentifiers | Premium Enterprise IT Services and Solutions" />
    <meta property="og:description" content="Premium enterprise technology services and packaged business solutions from Hyderabad." />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var key = 'talentifiers-theme';
          var stored = localStorage.getItem(key);
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (error) {}
      })();
    </script>
    <title>Talentifiers | Premium Enterprise IT Services and Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
